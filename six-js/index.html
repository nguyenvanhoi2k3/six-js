<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>six-js</title>

    <link rel="stylesheet" href="./dist/style.css" />
    <link rel="stylesheet" href="./index.css" />
  </head>

  <body>
    <div class="container">
      <img
        class="img"
        src="https://cdn.shopify.com/s/files/1/0768/4069/8019/files/SixJS..jpg?v=1783711159"
        alt=""
      />
    </div>

    <script type="module">
      import { six } from "./dist/six-js.es.js";

      let tl = six.timeline();
      tl.set(".img", { x: "-50%", y: "-50%" })
        .to(".img", {
          opacity: 1,
          duration: 0.8,
        })
        .to(".img", {
          width: "100vw",
          top: "100%",
          y: "-100%",
          duration: 1.5,
          ease: "quintInOut",
        })
        .to(".img", {
          y: "-120vh",
          duration: 1.5,
          ease: "quintInOut",
        });
    </script>
