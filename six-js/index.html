<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>six-js</title>

    <link rel="stylesheet" href="./dist/style.css" />
    <link rel="stylesheet" href="./index.css" />
  </head>

  <body>
    <div class="container">
      <div class="space"></div>
      <div class="space"></div>
      <div class="flex" style="gap: 10px">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
      </div>
      <div class="space"></div>
      <div class="space"></div>
    </div>

    <script type="module">
      import { six } from "./dist/six-js.es.js";
      six.to(".box", {
        rotate: 180,
        onScroll: {
          target: ".flex",
          start: "top center",
          end: "top top",
          sync: 0.3,
          debug: true,
        },
      });
    </script>
