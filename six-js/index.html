<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>six-js</title>

    <link rel="stylesheet" href="./dist/style.css" />
    <link rel="stylesheet" href="./index.css" />
  </head>

  <body>
    <div class="container">
      <div class="box" id="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>

    <script type="module">
      import { six } from "./dist/six-js.es.js";
      // const boxes = six.getClass(".box");
      const box = six.getId("box");
      six.set(box, { background: "yellow" });
      six.to(box, {
        rotate: 100,
        duration: 1.5,
        ease: "strongInOut"
      });
    </script>
