    <!-- horizontal -->
    <sx-slider
      name="slider-2"
      effect="fade"
      per-view="1"
      gap="10"
      start-index="0"
      breakpoints="{
      361: {
        per-view: 2,
        gap: 20,
       effect: 'slide'

      },
      768: {
        per-view: 3,
        gap: 30,
        effect: 'slide'
      },
      1080: {
        per-view: 4,
        gap: 40,
        right-padding: 100,
        effect: 'slide',
        centered: 'true',
        auto-centered: 'true',
        auto-height: 'true',
        grab-cursor: 'true',
        auto-height: 'true'
      }
    }"
    >
      <sx-slider-track>
        <sx-slider-slide>
          <div class="slide" style="width: 100%; height: 400px">Slide 1</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 100%; height: 500px">Slide 2</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 100%; height: 400px">Slide 3</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 100%; height: 400px">Slide 4</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 100%; height: 400px">Slide 5</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 100%; height: 400px">Slide 6</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 100%; height: 400px">Slide 7</div>
        </sx-slider-slide>
      </sx-slider-track>
      <sx-slider-prev
        style="
          position: absolute;
          top: 50%;
          transform: translateY(-50%);
          left: 0;
        "
        >Prev</sx-slider-prev
      >
      <sx-slider-next
        style="
          position: absolute;
          top: 50%;
          transform: translateY(-50%);
          right: 0;
        "
        >Next</sx-slider-next
      >
    </sx-slider>
    <h3>Link bằng name</h3>
    <sx-slider-prev name="slider-2">Prev</sx-slider-prev>
    <sx-slider-next name="slider-2">Next</sx-slider-next>
    <script src="./dist/six-js.umd.js"></script>
