<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>six-js</title>

    <link rel="stylesheet" href="./index.css" />
    <!-- <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-element-bundle.min.js"></script> -->
  </head>

  <body>
    <sx-slider
      name="slider-1"
      per-view="1"
      gap="10"
      speed="400"
      breakpoints="{
        360: {
          per-view: 2,
          gap: 20
        },
        768: {
          per-view: 3,
          gap: 30
        },
        1080: {
          per-view: 4,
          gap: 40
        }
      }"
    >
      <sx-slider-track>
        <sx-slider-slide>
          <div class="slide">Slide 1</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide">Slide 2</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide">Slide 3</div>
        </sx-slider-slide>
      </sx-slider-track>
      <sx-slider-prev>Prev</sx-slider-prev>
      <sx-slider-next>Next</sx-slider-next>
      <sx-slider-pagination>
        <!-- các thẻ dot (tượng trưng cho từng slide) sẽ được render và dot được active sẽ có attr riêng để tự do css -->
      </sx-slider-pagination>
      <sx-slider-progress>
        <!-- render thanh tiến trình cơ bản để tự do css, thanh tiến trình này phải phục vụ cho cả chức năng draggable -->
      </sx-slider-progress>
      <sx-slider-thumbnail>
        <!-- render thumbnail ở đây -->
      </sx-slider-thumbnail>
    </sx-slider>
    <h3>Điều khiển slider bằng name</h3>
    <sx-slider-prev name="slider-1">Prev</sx-slider-prev>
    <sx-slider-next name="slider-1">Next</sx-slider-next>

    <div style="height: 20vh"></div>

    <script src="./dist/six-js.umd.js"></script>
  </body>
</html>
