<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>six-js</title>

    <link rel="stylesheet" href="./dist/style.css" />
    <link rel="stylesheet" href="./index.css" />
  </head>

  <body>
    <div class="box"></div>

    <script type="module">
      import { six } from "./dist/six-js.es.js";
      // delay trong từng keyframes chưa hoạt động
      // khi boomerang false và chạy xong frame cuối thì box không start ở vị trí ban đầu ngay mà bị giật một đoạn rồi chạy x(100) ngay tại vị trí kết thúc của frame cuối sau đó lại giật lên frame thứ 2 (y: 200)
      six.to(".box", {
        keyframes: [
          { x: 100, duration: 1, ease: "sineInOut" }, // finetune with individual eases
          { y: 200, duration: 1 }, // create a 0.5 second gap
          { rotate: 360, duration: 2, delay: -0.25 }, // overlap by 0.25 seconds
        ],
        duration: 1,
        repeat: -1,
        ease: "strongInOut",
      });
    </script>
