<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>six-js</title>

    <link rel="stylesheet" href="./index.css" />
    <link rel="stylesheet" href="./dist/six-js.css" />
  </head>

  <body>
    <sx-slider
      direction="vertical"
      name="slider-1"
      per-view="3"
      drag="true"
      gap="10"
      style="--sx-slider-height: 600px"
      vertical-scroll
      per-move="2"
      snap
      edge-resistance="0"
      >
      <sx-slider-track>
        <sx-slider-slide>
          <div class="slide" style="width: 100%; height: 100%;">Slide 1</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 100%; height: 100%;">Slide 2</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 100%; height: 100%;">Slide 3</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 100%; height: 100%;">Slide 4</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 100%; height: 100%;">Slide 5</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 100%; height: 100%;">Slide 6</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 100%; height: 100%;">Slide 7</div>
        </sx-slider-slide>
      </sx-slider-track>

      <sx-slider-prev
        style="
          position: absolute;
          top: 50%;
          transform: translateY(-50%);
          left: 0;
        "
        >Prev</sx-slider-prev
      >
      <sx-slider-next
        style="
          position: absolute;
          top: 50%;
          transform: translateY(-50%);
          right: 0;
        "
        >Next</sx-slider-next
      >
    </sx-slider>
    <h3>Link bằng name</h3>
    <sx-slider-prev name="slider-1">Prev</sx-slider-prev>
    <sx-slider-next name="slider-1">Next</sx-slider-next>

    <!-- horizontal -->
    <sx-slider name="slider-2" per-view="2" gap="10" start-index="0" per-move="2" loop auto-size auto-height>
      <sx-slider-track>
        <sx-slider-slide>
          <div class="slide" style="width: 300px; height: 400px">Slide 1</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 300px; height: 500px">Slide 2</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 500px; height: 400px">Slide 3</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 500px; height: 400px">Slide 4</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 500px; height: 400px">Slide 5</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 500px; height: 400px">Slide 6</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 500px; height: 400px">Slide 7</div>
        </sx-slider-slide>
      </sx-slider-track>
      <sx-slider-prev
        style="
          position: absolute;
          top: 50%;
          transform: translateY(-50%);
          left: 0;
        "
        >Prev</sx-slider-prev
      >
      <sx-slider-next
        style="
          position: absolute;
          top: 50%;
          transform: translateY(-50%);
          right: 0;
        "
        >Next</sx-slider-next
      >
    </sx-slider>
    <h3>Link bằng name</h3>
    <sx-slider-prev name="slider-2">Prev</sx-slider-prev>
    <sx-slider-next name="slider-2">Next</sx-slider-next>
    <script src="./dist/six-js.umd.js"></script>
  </body>
</html>
