<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>six-js</title>

    <link rel="stylesheet" href="./dist/style.css" />
    <link rel="stylesheet" href="./index.css" />
  </head>

  <body>
    <div style="height: 100vh"></div>

    <video
      id="scrub-video"
      src="./static/video/video_onscroll.mp4"
      muted
      playsinline
      preload="auto"
      style="width: 100vw; height: 100vh; object-fit: cover; display: block"
    ></video>
    <div style="height: 100vh"></div>

    <script type="module">
      import { six } from "./dist/six-js.es.js";
      six.initElements();

      const video = six.getId("scrub-video");

      function initScrub() {
        six.to(video, {
          currentTime: video.duration,
          onScroll: {
            sticky: true,
            sync: 0.6,
            start: "top top",
            end: "+=2400",
          },
        });
      }

      if (video.readyState >= 1) {
        initScrub();
      } else {
        video.addEventListener("loadedmetadata", initScrub, { once: true });
        video.addEventListener(
          "error",
          () =>
            console.error(
              "[demo] video load thất bại, kiểm tra ./scrub-video.mp4 có tồn tại không",
              video.error,
            ),
          { once: true },
        );
      }
    </script>
