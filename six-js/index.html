<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>six-js</title>

    <link rel="stylesheet" href="./index.css" />
    <link rel="stylesheet" href="./dist/six-js.css" />
  </head>

  <body>
    <sx-slider
      name="slider-1"
      per-view="3"
      gap="10"
      grab-cursor
      auto-width
      start-index="0"
    >
      <sx-slider-track>
        <sx-slider-slide>
          <div class="slide" style="width: 400px;">Slide 1</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 500px">Slide 2</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 500px">Slide 3</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 300px;">Slide 4</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 350px">Slide 5</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 400px">Slide 6</div>
        </sx-slider-slide>
        <sx-slider-slide>
          <div class="slide" style="width: 250px">Slide 7</div>
        </sx-slider-slide>
      </sx-slider-track>
      <div
        style="
          display: flex;
          justify-content: space-between;
          width: 100%;
          position: absolute;
          top: 50%;
          transform: translateY(-50%);
        "
      >
        <sx-slider-prev>Prev</sx-slider-prev>
        <sx-slider-next>Next</sx-slider-next>
      </div>
    </sx-slider>
    <h3>Link bằng name</h3>
    <sx-slider-prev name="slider-1">Prev</sx-slider-prev>
    <sx-slider-next name="slider-1">Next</sx-slider-next>
    <script src="./dist/six-js.umd.js"></script>
  </body>
</html>
