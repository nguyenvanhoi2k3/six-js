<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>six-js</title>

    <link rel="stylesheet" href="./dist/style.css" />
    <link rel="stylesheet" href="./index.css" />
  </head>

  <body>
    <div class="space"></div>
    <div class="box">BOX</div>
    <div class="space"></div>

    <script type="module">
      import { six } from "./dist/six-js.es.js";
      six.to(".box", {
        x: 200,
        rotate: 20,
        duration: 2,
        onScroll: {
          target: ".box",
          start: "center center",
          end: "bottom top",
          sync: 0.3,
          debug: true,
        },
      });
    </script>
