<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>six-js</title>

    <link rel="stylesheet" href="./index.css" />
  </head>

  <body>
    <div style="height: 10vh"></div>

    <sx-marquee
      class="flex-center"
      style="border: 1px solid #797878; background: #ccc; height: 50px"
      direction="right"
      speed="100"
      pause-on-hover="false"
    >
      <sx-marquee-inner>
        <sx-marquee-item>
          <span>🔥 Tin tức mới nhất: Hot sale tháng 11!</span>
        </sx-marquee-item>
      </sx-marquee-inner>
    </sx-marquee>

    <div style="height: 20vh"></div>

    <sx-marquee
      class="flex-center"
      style="border: 1px solid #797878; background: #ccc; height: 50px"
      speed="100"
      pause-on-hover="false"
    >
      <sx-marquee-inner>
        <sx-marquee-item>
          <span> item maruqee 1</span>
        </sx-marquee-item>
        <sx-marquee-item>
          <span> item maruqee 2</span>
        </sx-marquee-item>
        <sx-marquee-item>
          <span> item maruqee 3</span>
        </sx-marquee-item>
        <sx-marquee-item>
          <span> item maruqee 4</span>
        </sx-marquee-item>
      </sx-marquee-inner>
    </sx-marquee>

    <div style="height: 20vh"></div>

    <sx-marquee class="flex-center" direction="right" speed="150">
      <sx-marquee-inner>
        <sx-marquee-item>
          <img
            style="width: 300px; height: 200px; object-fit: cover"
            src="https://images.pexels.com/photos/11774912/pexels-photo-11774912.jpeg"
          />
        </sx-marquee-item>
        <sx-marquee-item>
          <img
            style="width: 280px; height: 250px; object-fit: cover"
            src="https://images.pexels.com/photos/10737735/pexels-photo-10737735.jpeg"
          />
        </sx-marquee-item>
        <sx-marquee-item>
          <img
            style="width: 300px; height: 200px; object-fit: cover"
            src="https://images.pexels.com/photos/5739232/pexels-photo-5739232.jpeg"
          />
        </sx-marquee-item>
        <sx-marquee-item>
          <img
            style="width: 220px; height: 220px; object-fit: cover"
            src="https://images.pexels.com/photos/36412364/pexels-photo-36412364.jpeg"
          />
        </sx-marquee-item>
      </sx-marquee-inner>
    </sx-marquee>

    <div style="height: 20vh"></div>

    <sx-marquee class="flex-center" speed="100" gap="50" pause-on-hover="false">
      <sx-marquee-inner>
        <sx-marquee-item>
          <img src="https://cdn-icons-png.flaticon.com/128/1384/1384060.png" />
        </sx-marquee-item>
        <sx-marquee-item>
          <img src="https://cdn-icons-png.flaticon.com/128/5968/5968764.png" />
        </sx-marquee-item>
        <sx-marquee-item>
          <img
            src="https://cdn-icons-png.flaticon.com/128/15707/15707749.png"
          />
        </sx-marquee-item>
        <sx-marquee-item>
          <img src="https://cdn-icons-png.flaticon.com/128/3116/3116491.png" />
        </sx-marquee-item>
        <sx-marquee-item>
          <img src="https://cdn-icons-png.flaticon.com/128/5969/5969020.png" />
        </sx-marquee-item>
        <sx-marquee-item>
          <img src="https://cdn-icons-png.flaticon.com/128/5968/5968472.png" />
        </sx-marquee-item>
      </sx-marquee-inner>
    </sx-marquee>

    <div style="height: 20vh"></div>

    <script src="./dist/six-js.umd.js"></script>
  </body>
</html>
