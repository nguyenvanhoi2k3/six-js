    <div class="container">
      <div class="box"></div>

    <script type="module">
      import { six } from "./dist/six-js.es.js";
      six.setDefaults({ ease: "quint-in-out" });
      const anim = six.to(".box", {
        x: 600,
        rotate: 360,
        duration: 2,
        repeat: -1,
        boomerang: true,
      });
    </script>
