<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>six-js</title>

    <link rel="stylesheet" href="./dist/style.css" />
    <link rel="stylesheet" href="./index.css" />
  </head>

  <body>
    <sx-dialog-trigger name="1">open</sx-dialog-trigger>
    <sx-dialog position="right" effect="slide-left" name="1">
      <div style="background: #fff;">
        <sx-animate>heading</sx-animate>
      </div>
    </sx-dialog>
    <div class="container">
      <h1 class="title">
        Build beautiful web animations with
        <strong>six.js</strong>
        🚀✨
      </h1>

      <div class="buttons">
        <button id="chars">Chars</button>
        <button id="words">Words</button>
        <button id="lines">Lines</button>
        <button id="all">Chars + Words + Lines</button>

        <button id="maskChars">Mask Chars</button>
        <button id="maskWords">Mask Words</button>
        <button id="maskLines">Mask Lines</button>

        <button id="revert">Revert</button>
      </div>
    </div>

    <script type="module">
      import { six } from "./dist/six-js.es.js";
      import { splitText } from "./dist/split-text.es.js";
      six.initElements();
      let split;

      function run(type, mask = null) {
        console.log("RUN:", type, mask);
        split?.revert();

        split = splitText(".title", {
          type,

          mask,

          autoSplit: true,

          charsClass: "char++",

          wordsClass: "word++",

          linesClass: "line++",

          onSplit(self) {
            console.clear();

            console.log("chars", self.chars);
            console.log("words", self.words);
            console.log("lines", self.lines);

            let targets;

            if (type.includes("chars")) targets = self.chars;
            else if (type.includes("words")) targets = self.words;
            else targets = self.lines;

            six.set(targets, {
              y: "120%",
              opacity: 0,
            });

            return six.to(targets, {
              y: "0%",
              opacity: 1,
              duration: 0.8,
              ease: "expoOut",
              stagger: 0.08,
            });
          },
        });
      }
      document.getElementById("chars").onclick = () => run("chars");

      document.getElementById("words").onclick = () => run("words");

      document.getElementById("lines").onclick = () => run("lines");

      document.getElementById("all").onclick = () => run("chars,words,lines");

      document.getElementById("maskChars").onclick = () =>
        run("chars", "chars");

      document.getElementById("maskWords").onclick = () =>
        run("words", "words");

      document.getElementById("maskLines").onclick = () =>
        run("lines", "lines");

      document.getElementById("revert").onclick = () => split?.revert();

      // chạy demo lần đầu
      run("chars,words,lines");
    </script>
