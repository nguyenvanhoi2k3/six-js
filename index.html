<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>six-js sandbox</title>
    <link rel="stylesheet" href="./index.css" />
  </head>

  <body>
    <div class="space"></div>
    <div class="box"></div>
    <div class="container">
      <div class="track" style="display: flex; gap: 20px">
        <span class="char">Lorem</span>
        <span class="char">ipsum</span>
        <span class="char">dolor</span>
        <span class="char">sit</span>
        <span class="char">amet</span>
        <span class="char">consectetur</span>
        <span class="char">adipiscing</span>
        <span class="char">elit</span>
        <span class="char">sed</span>
        <span class="char">do</span>
        <span class="char">eiusmod</span>
        <span class="char">tempor</span>
        <span class="char">incididunt</span>
        <span class="char">ut</span>
        <span class="char">labore</span>
      </div>
    </div>
    <div class="space"></div>

    <script type="module">
      import { six, enableElements } from "./dist/six-js.es.js";
      enableElements();
      const container = document.querySelector(".container");
      const track = document.querySelector(".track");

      const distance = track.scrollWidth - window.innerWidth;
      six.to(".box", {
        x: 300,
        scrollTrigger:{
          start: "+=100 bottom",
          end: "top center",
          debug: true,
          scrub:true
        }
      });

      // six.to(track, {
      //   x: -distance,

      //   scrollTrigger: {
      //     trigger: container,
      //     start: "center center",
      //     end: `+=${distance}`,
      //     scrub: 0.6,
      //     pin: true,
      //      onUpdate() {
      //       console.log("update")
      //      }
      //   },
      // });
    </script>
  </body>
</html>
