<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tilt card demo (rotationX/rotationY)</title>
    <link rel="stylesheet" href="./index.css" />
    <style>
      .stage {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 60px;
        background: radial-gradient(circle at 50% 40%, #171b2b 0%, #0a0d14 70%);
      }

      /* perspective lives on the wrapper, once, as plain CSS - six-js only ever
         tweens rotationX/rotationY on the card itself. */
      .card-wrap {
        perspective: 800px;
      }

      .card {
        width: 240px;
        height: 320px;
        border-radius: 20px;
        background: linear-gradient(155deg, #2d1f3d 0%, #24304d 100%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
        transform-style: preserve-3d;
        will-change: transform;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 24px;
        box-sizing: border-box;
        cursor: pointer;
      }

      .card .glow {
        position: absolute;
        inset: 0;
        border-radius: 20px;
        background: radial-gradient(
          circle at var(--gx, 50%) var(--gy, 50%),
          rgba(255, 255, 255, 0.16),
          transparent 60%
        );
        pointer-events: none;
      }

      .card {
        position: relative;
      }

      .card h3 {
        margin: 0 0 6px;
        font-size: 20px;
      }
      .card p {
        margin: 0;
        opacity: 0.6;
        font-size: 13px;
      }

      .hero-copy {
        position: fixed;
        top: 32px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        pointer-events: none;
      }
      .hero-copy h1 {
        font-size: clamp(24px, 4vw, 40px);
        font-weight: 800;
        margin-bottom: 8px;
      }
      .hero-copy p {
        opacity: 0.6;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="hero-copy">
      <h1>Tilt card</h1>
      <p>rotationX / rotationY driven by six.to() - stays in place, no translate drift</p>
    </div>

    <section class="stage">
      <div class="card-wrap">
        <div class="card" data-tilt>
          <div class="glow"></div>
          <h3>Card A</h3>
          <p>Move the mouse over me</p>
        </div>
      </div>

      <div class="card-wrap">
        <div class="card" data-tilt>
          <div class="glow"></div>
          <h3>Card B</h3>
          <p>Each card tilts independently</p>
        </div>
      </div>
    </section>

    <script type="module">
      import { six } from "./dist/index.js";

      const maxTilt = 15; // max rotation in degrees

      document.querySelectorAll("[data-tilt]").forEach((card) => {
        card.addEventListener("pointermove", (e) => {
          const rect = card.getBoundingClientRect();
          const px = (e.clientX - rect.left) / rect.width - 0.5; // -0.5..0.5
          const py = (e.clientY - rect.top) / rect.height - 0.5;

          six.to(card, {
            rotateY: px * maxTilt * 2,
            rotateX: -py * maxTilt * 2,
            duration: 0.5,
            ease: "cubicOut",
            overwrite: "auto",
          });

          card.style.setProperty("--gx", `${(px + 0.5) * 100}%`);
          card.style.setProperty("--gy", `${(py + 0.5) * 100}%`);
        });

        card.addEventListener("pointerleave", () => {
          six.to(card, {
            rotateX: 0,
            rotateY: 0,
            duration: 0.6,
            ease: "backOut",
            overwrite: "auto",
          });
        });
      });
    </script>
  </body>
</html>
