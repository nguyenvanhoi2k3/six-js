<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>burst() demo</title>
    <link rel="stylesheet" href="./index.css" />
    <style>
      .container {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }
      .hero-text {
        margin: 0;
        font-size: clamp(48px, 11vw, 150px);
        font-weight: 800;
        text-align: center;
        white-space: nowrap;
        letter-spacing: -0.02em;
        color: #ffd166;
      }
      #heart {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1 class="hero-text" id="heroText">Sixjs Library</h1>
    </div>
    <div class="space flex-center">
      <button id="like">❤️ Like</button>

      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="96"
        height="96"
        fill="#e6d1d1"
        viewBox="0 0 256 256"
        id="heart"
      >
        <path
          d="M206.83,125.17a4,4,0,0,1,0,5.66l-82.06,82a52,52,0,0,1-73.54-73.55L150.52,38.55a36,36,0,1,1,50.94,50.9l-99.3,100.69a20,20,0,1,1-28.3-28.27l83.29-84.68a4,4,0,1,1,5.7,5.61L79.54,167.5a12,12,0,1,0,16.95,17L195.78,83.81A28,28,0,1,0,156.2,44.18L56.91,144.87a44,44,0,1,0,62.21,62.26l82-82A4,4,0,0,1,206.83,125.17Z"
        ></path>
      </svg>
    </div>
    <div class="space"></div>
    <div class="space"></div>
    <div class="space"></div>

    <script type="module">
      import { six, splitText } from "./dist/six-js.es.js";
      document.querySelector("#like").addEventListener("click", (e) => {
        six.burst(e.currentTarget, {
          targets: "#heart",
          clone: 20,
          power: [400, 500],
          spread: [-45, 45],
        });
      });
      const heroText = document.getElementById("heroText");

      six.set(heroText, { y: -window.innerHeight });

      six.to(heroText, {
        y: 0,
        duration: 1.3,
        ease: "bounceOut",
        onComplete: () => {
          const heroCharSplit = splitText(heroText, {
            type: "chars",
            charsClass: "hero-char",
          });
         
          six.burst(heroText, {
            targets: heroCharSplit.chars,
            spread: [-45, 45],
            power: [460, 600],
            gravity: 1200,
            duration: [1, 1.8],
            rotationSpeed: [-100, 100],
            stagger: 0.01
          });
        },
      });
    </script>
  </body>
</html>
